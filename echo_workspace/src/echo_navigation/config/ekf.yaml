ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    print_diagnostics: true
    diagnostics_period: 1.0

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    gravitational_acceleration: 9.80665
    use_control: false

    # Wheel-only EKF for stable SLAM.
    # Raw MPU gyro yaw-rate caused false rotation during straight driving.
    odom0: /wheel_odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10
    odom0_nodelay: false
